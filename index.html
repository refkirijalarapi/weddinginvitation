<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wedding</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="main.css">

    <script src="https://kit.fontawesome.com/0a267e6f70.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  </head>
  <body>

    <div class="row col-12 col-sm-12 col-md-12 col-lg-4 col-xl-4 mx-auto">
        <div class="cover d-flex flex-column justify-content-between" style="background-image: url('background.jpg'); height: 100vh;">
            <div class="overlay"></div>
            
            <div class="cover-content-title text-center p-2 mt-4">
              <p data-aos="zoom-in-down" data-aos-duration="3000">The Wedding of</p>
              <h3 data-aos="zoom-in-down" data-aos-duration="3000">M.Sodikin & Hemalia</h3>
              <p data-aos="zoom-in-down" data-aos-duration="3000">30 . 05 . 2026</p>
            </div>
            
            <div class="cover-content d-flex justify-content-center align-items-center text-center p-2 mb-4">
                <div class="invitation-content">
                    <div class="p-2 mt-1">
                        <p>Kepada Yth; <br> Bapak/Ibu/Saudara/i</p>
                        <p class="fw-bold" id="name">Tamu</p>
                        <a href="content.html" class="btn"><i class="fa-regular fa-envelope-open"></i> Buka Undangan</a>
                    </div>
                </div>
            </div>
          </div>
    </div>
      

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script src="script.js"></script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script>
    // Fungsi untuk mengambil parameter dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const namaTamu = urlParams.get('to');

    // Jika parameter 'to' ada di URL, ganti isi teks di id guest-name
    if (namaTamu) {
        // Mengganti karakter '+' atau '%20' menjadi spasi secara otomatis
        document.getElementById('name').innerText = namaTamu;
    }
</script>

  </body>
</html>
