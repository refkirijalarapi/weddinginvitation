<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wedding</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="main.css">

    <script src="https://kit.fontawesome.com/0a267e6f70.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  </head>
  <body>

    <div class="row col-12 col-sm-12 col-md-12 col-lg-4 col-xl-4 mx-auto">
        <div class="cover d-flex flex-column justify-content-between" style="background-image: url('background.jpg'); height: 100vh;">
            <div class="overlay"></div>
            
            <div class="cover-content-title text-center p-2 mt-4">
              <p data-aos="zoom-in-down" data-aos-duration="3000">The Wedding of</p>
              <h3 data-aos="zoom-in-down" data-aos-duration="3000">M.Sodikin & Hemalia</h3>
              <p data-aos="zoom-in-down" data-aos-duration="3000">30 . 05 . 2026</p>
            </div>
            
            <div class="cover-content d-flex justify-content-center align-items-center text-center p-2 mb-4">
                <div class="invitation-content">
                    <div class="p-2 mt-1">
                        <p>Kepada Yth; <br> Bapak/Ibu/Saudara/i</p>
                        <p class="fw-bold" id="name">Tamu</p>
                        <a href="content.html" class="btn"><i class="fa-regular fa-envelope-open"></i> Buka Undangan</a>
                    </div>
                </div>
            </div>
          </div>
    </div>
      

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script src="script.js"></script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script>
    // 1. Inisialisasi AOS (Animate On Scroll)
    // Memastikan animasi berjalan saat halaman di-scroll
    AOS.init({
        duration: 1000, // durasi animasi dalam milidetik
        once: true,     // animasi hanya berjalan sekali saat di-scroll
    });

    // 2. Logika Mengambil Nama dari URL
    // Contoh URL: index.html?to=Deni_Priatna
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const namaRaw = urlParams.get('to');

    // Jika parameter 'to' ditemukan di URL
    if (namaRaw) {
        // .replace(/_/g, ' ') akan mencari semua (_) dan menggantinya dengan spasi ( )
        // .replace(/\+/g, ' ') juga menangani jika URL menggunakan tanda plus (+) untuk spasi
        const namaClean = namaRaw.replace(/_/g, ' ').replace(/\+/g, ' ');

        // Masukkan nama yang sudah bersih ke dalam elemen HTML
        const elemenNama = document.getElementById('name');
        if (elemenNama) {
            elemenNama.innerText = namaClean;
        }
    }
    </script>
    

  </body>
</html>
